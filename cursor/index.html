<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="pointer-cursor">
        <p>Hover over this text to see the pointer cursor.</p>
    </button>
    <button class="text-cursor">
        <p>Hover over this text to see the default cursor.</p>
    </button>
    <button class="grab-cursor">
        <p>Hover over this text to see the grab cursor.</p>
    </button>
    <button class="wait-cursor">
        <p>Hover over this text to see the wait cursor.</p>
    </button>
    <button class="not-allowed-cursor">
        <p>Hover over this text to see the not-allowed cursor.</p>
    </button>
    <button class="crosshair-cursor">
        <p>Hover over this text to see the crosshair cursor.</p>
    </button>
    <button class="url-cursor">
        <p>Hover over this text to see the url cursor.</p>
    </button>
</body>
</html>
